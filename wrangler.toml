# Cloudflare Pages — test-legacy-in-motion-web-app.pages.dev
# Production deploys from the staging branch (GitHub → Cloudflare)

name = "test-legacy-in-motion-web-app"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"

[vars]
NEXT_PUBLIC_LOCAL_TEST_MODE = "true"
NEXT_PUBLIC_APP_URL = "https://test-legacy-in-motion-web-app.pages.dev"

# Set in Cloudflare Pages dashboard → Settings → Environment variables:
# CF_PAGES=1, LOCAL_TEST_MODE=true, NODE_VERSION=20
# Build command: npm run build:pages
