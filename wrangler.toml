# Cloudflare Pages — test-legacy-in-motion-web-app.pages.dev
# Production deploys from the staging branch (GitHub → Cloudflare)
#
# Dashboard build settings (Settings → Builds) — REQUIRED:
#   Build command:        npm run build:pages
#   Build output dir:     out
#   Do NOT use the Next.js (@cloudflare/next-on-pages) framework preset.
#
# Stripe / Clerk / DATABASE_URL → set in Dashboard → Settings → Environment variables (Production).
# Do NOT duplicate NEXT_PUBLIC_STRIPE_ENABLED or LOCAL_TEST_MODE here — they would override the dashboard.

name = "test-legacy-in-motion-web-app"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
CF_PAGES = "1"
NEXT_PUBLIC_APP_URL = "https://test-legacy-in-motion-web-app.pages.dev"
